<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Card --> CWH #HTML #SIGMABATCHOP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Manrope:wght@200..800&family=Space+Grotesk:wght@300..700&display=swap');

        .card {
            font-family: "Baloo 2", sans-serif;
            font-optical-sizing: auto;
            width: 422px;
            padding: 10px;
            border: solid 1px rgb(182, 181, 181);
            box-sizing: border-box;
            box-shadow: 2px 1px 4px gray;
            border-radius: 10px;
            margin: 50px auto;
        }

        .card img {
            height: 300px;
            width: 400px;
            border-radius: 10px;
        }

        .card span {
            margin: 5px;
            border: solid 1px rgb(182, 181, 181);
            padding: 5px 10px;
            border-radius: 50px;
            font-weight: bold;
            color: rgb(182, 181, 181);
        }

        .card_content {
            margin: 20px;
        }

        button {
            display: block;
            margin: auto;
            padding: 10px 20px;
            border-radius: 50px;
            border: none;
            color: rgb(107, 107, 243);
            background-color: rgb(179, 179, 235);
            font-weight: bold;
        }
    </style>
</head>

<body>
    <main>
        <div class="card">
            <img src="card.jpg" alt="Nature Image">
            <div class="card_content">
                <span>Nature</span>
                <span>Lake</span>
                <h2>Loga Hello</h2>
                <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Exercitationem nesciunt sapiente vel
                    labore, sequi quos ipsum cumque quidem, illo repellendus aliquam quam. Dolorem!
                </p>
                <button>Read More</button>
            </div>
        </div>
    </main>
</body>

</html>
