<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Exercise -->CWH #SIGMABATCHOP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+Bhai+2:wght@400..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
    </style>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: "Baloo Bhai 2", sans-serif;
        }

        /* headLine */
        .headline {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 45px;
            background-color: rgb(255 217 62);
            font-size: 18px;
            font-weight: 400;
        }

        .headline p {
            margin: 0 20px;
        }

        .headline p span {
            font-weight: 600;
        }

        .headline a {
            color: black;
            font-weight: 600;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            margin: 0 120px;
            background-color: #dfdfdf63;
            margin-top: 20px;
            border: 1px solid #cdcbcb;
            border-radius: 5px;
            padding: 5px 20px;
        }

        .items {
            display: flex;
            align-items: center;
            font-size: 14px;
            font-weight: 500;
        }

        .item {
            font-family: "Poppins", sans-serif;
            margin: 20px 12px;
            text-decoration: none;
            color: black;

        }

        .button-to {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .button-to button {
            padding: 6px 22px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
        }

        .button-to button:first-child {
            background-color: rgb(255 217 62);
            font-weight: 500;
        }

        button:first-child:hover {
            opacity: 0.5;
        }

        .language-button:hover {
            filter: brightness(0.8);
        }

        /* main */
        .content {
            display: flex;
            flex-direction: column;
            gap: 30px;
            align-items: center;
            padding: 120px;
            padding-bottom: 50px;
        }

        .content h1 {
            font-size: 50px;
            font-weight: 500;
            font-family: "Poppins", sans-serif;
        }

        .content .text-content {
            font-size: 20px;
            text-align: center;
            color: gray;
        }

        .content button {
            font-size: 16px;
            background-color: rgb(255 217 62);
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            font-weight: 500;
        }

        .content button i {
            margin: 0 5px;
        }

        .download-section {
            display: flex;
            flex-wrap: wrap;
            margin: 50px 120px;
            gap: 30px;
        }

        .download-section .box {
            height: 200px;
            width: 405px;
            background-color: #e6dfd7ad;
            border-radius: 15px;
        }
    </style>
</head>

<body>
    <header>
        <div class="headline">
            <p>UE Core & Enterprise Subscriptions: <span>Get 10% Off</span> on your second year</p>
            <a href="#">Buy Now&#8594</a>
        </div>
        <nav>
            <div class="logo">
                <img width="150px" height="58px"
                    src="https://www.ultraedit.com/wp-content/uploads/2023/01/UE_Site-Logo-1.png" alt="Company Logo"
                    class="logo">
            </div>
            <div class="items">
                <a href="#" class="item">Products &#8595</a>
                <a href="#" class="item">Buy</a>
                <a href="#" class="item">Renew</a>
                <a href="#" class="item">Support &#8595</i></a>
                <a href="#" class="item">Learn &#8595</a>
                <a href="#" class="item">Company &#8595</a>
            </div>
            <div class="button-to">
                <button>Download</button>
                <button class="language-button"><i class="fa-solid fa-globe"></i> English</button>
                <i class="fa fa-search"></i>
            </div>
        </nav>
    </header>
    <main>
        <div class="content">
            <h1>Download UltraEdit for Windows <i class='fab fa-microsoft' style='font-size:36px'></i></h1>
            <div class="text-content">
                <p>Download and try UltraEdit before you buy it! This download
                <p>includes the full Windows version of the text
                    editor.</p>
                </p>
            </div>
            <button><i class="fa-brands fa-apple"></i><i class="fa-brands fa-linux"></i>Download Mac or Linux
                version <i class="fas fa-arrow-right"></i></button>
        </div>
        <div class="download-section">
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
        </div>
    </main>
</body>

</html>
