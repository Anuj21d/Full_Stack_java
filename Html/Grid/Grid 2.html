<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Part 1 --> CWH #SIGMABATCHOP</title>
    <style>
        .container {
            width: 70vw;

            border: 2px solid black;
            background-color: rgba(220, 216, 179, 0.792);
            display: grid;
            grid-template-areas:
                "nav nav nav"
                "sidebar main main"
                "footer footer footer";

            /* grid-template-columns: 1fr 1fr 2fr; */

        }

        .item {

            height: 35px;
            background-color: aqua;
            border: 2px solid rgb(209, 78, 30);
        }

        .item-1 {
            grid-area: nav;
        }

        .item-2 {
            grid-area: sidebar;
        }

        .item-3 {
            grid-area: main;
        }

        .item-4 {
            grid-area: footer;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="item item-1">1</div>
        <div class="item item-2">2</div>
        <div class="item item-3">3</div>
        <div class="item item-4">4</div>
    </div>
</body>

</html>
