<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Exercise --> CWH #SIGMABATCHOP</title>
    <style>
        .container {
            position: relative;
            height: 80vh;
            width: 80vw;
            background-color: blue;
        }

        .box {
            height: 121px;
            width: 121px;
            background-color: red;
            border-radius: 70px;
            position: absolute;
            bottom: 0;
            left: 0;
            animation: bouncY 2s infinite linear;

        }

        @keyframes bouncY {
            0% {
                transform: translateY(0) translateX(0);
                animation-timing-function: ease-out;
            }

            25% {
                transform: translateY(-100%) translateX(75%);
                animation-timing-function: ease-in;
            }

            50% {
                transform: translateY(0%) translateX(150%) scaleY(70%);
                animation-timing-function: ease-out;
            }

            75% {
                transform: translateY(-100%) translateX(225%);
                animation-timing-function: ease-in;
            }

            100% {
                transform: translateY(0) translateX(310%) scaleY(70%);
            }
        }

        /* @keyframes bouncY {
            0% {
                transform: translate(0, 0) scaleY(1);
            }

            25% {
                transform: translate(100px, -150px) scaleY(1);
            }

            50% {
                transform: translate(200px, 0) scaleY(0.7);
                 
            }

            75% {
                transform: translate(300px, -150px) scaleY(1);
            }

            100% {
                transform: translate(400px, 0) scaleY(1);
            }
        }*/
    </style>
</head>

<body>
    <div class="container">
        <div class="box"></div>
    </div>
</body>

</html>
