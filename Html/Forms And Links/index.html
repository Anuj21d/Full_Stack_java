<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms - Lets Learn it..</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <form action="POST">
        <div>
            <label for="Name">Name:</label>
            <input type="text" id="Name" name="Name" placeholder="Enter Your Name....">
        </div>
        <div>
            <label for="City">City:</label>
            <input type="text" id="City" name="City" placeholder="Enter Your City Name..">
        </div>
        <div>
            <label for="PinCode">Pinecode:</label>
            <input type="number" name="Pinecode" id="Pinecode" placeholder="Enter Your Pincode..">
        </div>
    </form>
</body>

</html>
