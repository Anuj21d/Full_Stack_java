<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box --> CWH #SIGMABATCHOP</title>
    <style>
        .container {
            height: 80vh;
            border: 2px solid black;
            background-color: antiquewhite;
            /* FLex box help to align content how we want like centre,end,middle.
            Its Apply on container having items */
            display: flex;
            justify-content: center;
            /* This justify-content help to align item horizontally with in the container  */
            /* align-items: center; */
            /* This align-items help to align item Vertically with in the container  */


            /* we can also change Flex direction with flex-direction property */
            /* flex-direction: column; */
            /* flex wrap used to wrap content that overlap or not fitts */
            flex-wrap: wrap;
            /* Flex Axis :-
                    There are two axis in this flex box :- 1)main axis 2)cross axis
                        1)main axis:-
                                so main axis means content jis line kai madat sai align hota hai if row then main axis is horizontally
                        2)cross axis:-
                                so cross axis means opposite line to main axis if items direction is row then cross axis is verticaly and help to align vertically */

            /* ther are some other property like align-content used when we have content in multiple line not onloy single line  */
            /* align-content: center; */

            /* flex-flow the property we used as multipe task in single line 
                flex-flow : flex-direction flex-wrap */
            /* flex-flow:row wrap; */
            gap: 10px;
            /* gap :- give margin between items 
                gap : row column;
                row-gap: 10px;
                column-gap: 10px;*/

        }

        .item {
            width: 62px;
            height: 62px;
            background-color: aqua;
            border: 2px solid rgb(247, 134, 42);
            /* flex box have individual flex propery for items too */
            /* Item Property :-
            Oreder:-
                this have for each item differnt if one item have higest oreder number amoung then it placed at last 
                defult vale is 0
            flex-Grow:-
                this property used to decied kitne items ki jaga ek item legha  */
            flex-grow: 1;

            flex-shrink: 2;
            /* item can shrink in 1/2 their width */

            align-self: flex-end;
        }

        .item1 {
            order: 1;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="item item1">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
        <div class="item">1</div>

    </div>
</body>

</html>
