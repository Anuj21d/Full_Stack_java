<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Layout Exercise--> CWH #SIGMABATCHOP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
    </style>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        :root {
            --primarycolor: rgb(243, 149, 35);
            --text-color: white;
            --seccolor: rgb(115, 240, 58);
            --bgcolor: rgba(241, 203, 134, 0.816);
        }

        body {
            background-color: var(--bgcolor);
        }

        header {
            position: sticky;
            z-index: 1000;
            top: 0;
        }

        ul {
            display: flex;
            background-color: var(--primarycolor);
        }

        ul li {
            list-style: none;
            padding: 10px;
            margin: 10px;
        }

        ul li a {
            text-decoration: none;
            color: var(--text-color);
            font-family: "Poppins", sans-serif;
            font-weight: bolder;
        }

        .mainbox {
            justify-content: center;
            background-color: var(--seccolor);
            margin: 20px;
            display: flex;
            padding: 20px;

        }

        .box {
            background-color: var(--primarycolor);
            width: 455px;
            height: 455px;
            margin: 50px;
        }

        .massage {
            font-family: "Poppins", sans-serif;
            font-weight: bolder;
            background-color: var(--primarycolor);
            border: 2px solid gray;
            border-radius: 70px;
            margin: 30px 150px;
            padding: 50px;
            text-align: center;
        }

        .logo {
            position: fixed;
            right: 10px;
            top: 50%;
            z-index: 1000;
        }

        .logo img {
            border-radius: 50px;
        }

        .footer {
            background-color: gray;
            height: 50px;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/">About</a></li>
                <li><a href="/">Contact</a></li>
                <li><a href="/">Information</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="mainbox">
            <div class="box"></div>
            <div class="box"></div>
        </div>
        <div class="massage">
            <div>
                <h1>Welcome To This Sigma Web Development Express</h1>
            </div>
        </div>
        <div class="logo">
            <img width="70px"
                src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRjfCut8tskaHBf05A-tD6SUYmI73DjRN_Cow&s"
                alt="DEKU LOGO">
        </div>
    </main>
    <footer>
        <div class="footer"></div>
    </footer>
</body>

</html>
