<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Clock</title>
    <style>
      body {
        background-color: rgb(211, 209, 209);
      }
      .clock {
        margin: 15vh auto;
        width: 600px;
        height: 600px;
        background-color: black;
        border: 20px solid gray;
        position: relative;
        border-radius: 50%;
        box-shadow: 0px 2px 20px 8px #242323;
      }
      .hours-hand {
        width: 5px;
        height: 200px;
        background-color: white;
        position: absolute;
        left: 50%;
        bottom: 300px;
        border-radius: 10px;
        transform-origin: bottom;
      }
      .minute-hand {
        width: 5px;
        height: 250px;
        background-color: white;
        position: absolute;
        left: 50%;
        bottom: 300px;
        border-radius: 10px;
        transform-origin: bottom;
        transform: rotate(6deg);
      }
      .second-hand {
        width: 5px;
        height: 250px;
        background-color: red;
        position: absolute;
        left: 50%;
        bottom: 300px;
        border-radius: 10px;
        transform-origin: bottom;
      }
      .numbers{
        font-size: 40px;
        color: aliceblue;
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
      }
      .num12{
        transform: translateY(7px) translateX(275px);
      }
      .num3{
        transform: translateY(232px) translateX(567px);
      }
      .num6{
        transform: translateY(460px) translateX(290px);
      }
      .num9{
        transform: translateY(148px) translateX(10px);
      }
    </style>
  </head>
  <body>
    <div class="clock">
      <div class="numbers num12">12</div>
      <div class="numbers num3">3</div>
      <div class="numbers num6">6</div>
      <div class="numbers num9">9</div>

      <div class="hours-hand"></div>
      <div class="minute-hand"></div>
      <div class="second-hand"></div>
    </div>
    <script>
        
        let hoursHand = document.querySelector('.hours-hand');
        let minuteHand = document.querySelector('.minute-hand');
        let secondHand = document.querySelector('.second-hand');

        function updateClock() {
          let now = new Date();
          let hours = now.getHours();
          let minutes = now.getMinutes();
          let seconds = now.getSeconds();

          let hoursRotation = (hours % 12) * 30 + (minutes / 60) * 30;
          let minutesRotation = minutes * 6 + (seconds / 60) * 6;
          let secondsRotation = seconds * 6;

          hoursHand.style.transform = `rotate(${hoursRotation}deg)`;
          minuteHand.style.transform = `rotate(${minutesRotation}deg)`;
          secondHand.style.transform = `rotate(${secondsRotation}deg)`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
  </body>
</html>
