<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Web App</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");
    </style>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Poppins", sans-serif;
        background-color: #f7f5f5;
      }
      .nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 78px;
        padding: 0 40px;
        background-color: #faf8ff;
        box-shadow: 0px 1px 2px #00000027;
      }
      .nav h1 {
        color: #004ac6;
        font-size: 32px;
      }
      .nav-icons img {
        margin: 0 10px;
        cursor: pointer;
      }
      .main {
        display: flex;
        flex-direction: column;
        gap: 32px;
        margin: 30px 240px;
      }

      .content-heading {
        background-color: #2563eb;
        padding: 32px;
        padding-bottom: 48px;
        position: relative;
        overflow: hidden;
        border-radius: 15px;
      }
      .heading-text {
        color: white;
      }
      .heading-text h1 {
        font-size: 24px;
      }
      .heading-text p {
        font-size: 16px;
      }
      .content-heading img {
        position: absolute;
        right: -20px;
        bottom: -30px;
        transform: rotate(7deg);
        opacity: 0.3;
      }
      .add-task {
        display: flex;
        padding: 16px;
        gap: 16px;
        align-items: center;
        background-color: #ffffff;
        border: 1px solid #c3c6d731;
        box-sizing: border-box;
        border-radius: 10px;
        box-shadow: 0px 0px 1px gray;
      }
      .add-task input {
        padding: 10px 16px;
        width: 100%;
        color: #6b7280;
        background-color: #f3f3fe;
        border: 1px solid #c3c6d7;
        border-radius: 10px;
      }
      .add-task button {
        height: 41px;
        width: 200px;
        background-color: #004ac6;
        border: none;
        color: white;
        border-radius: 9px;
      }
      .add-task button:hover {
        filter: drop-shadow(0px 0px 2px gray);
        border: 1px solid #dfe6f0;
      }

      .og-headline {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }
      .og-headline h3 {
        font-size: 24px;
      }
      .og-headline p {
        background-color: #6cf8bb;
        padding: 4px 12px;
        border-radius: 20px;
        color: #00714d;
        font-size: 12px;
      }
      .view-task {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 66px;
        background-color: #ffffff;
        padding: 0px 30px;
        border-radius: 10px;
        border: 1px solid #0000001a;
        font-size: 20px;
      }
      .view-task input {
        height: 20px;
        width: 20px;
      }
      .user-task {
        display: flex;
        gap: 15px;
        align-items: center;
      }
      footer {
        display: flex;
        align-items: center;
        height: 73px;
        background-color: #ffffff;
        padding: 0px 40px;
        position: fixed;
        bottom: 0;
        width: 96vw;
        color: #434655;
        box-shadow: 0px -1px 5px gray;
        justify-content: space-between;
      }
    </style>
  </head>
  <body>
    <navbar>
      <div class="nav">
        <h1>FocusTask</h1>
        <div class="nav-icons">
          <img src="icons/settings-02-stroke-rounded.svg" alt="" />
          <img src="icons/user-circle-stroke-rounded.svg" alt="" />
        </div>
      </div>
    </navbar>
    <main>
      <div class="main">
        <div class="content-heading">
          <div class="heading-text">
            <h1>Matser Your day.</h1>
            <p>
              Focus on what matters most with systematic organization and
              professional clarity.
            </p>
          </div>
          <img src="icons/check.svg" alt="check image" />
        </div>
        <div class="add-task">
          <input
            type="text"
            name="Task"
            id="user-task"
            placeholder="What need to be done?"
          />
          <button onclick="getInput()">Add Task</button>
        </div>
        <div class="onGoing">
          <div class="og-headline">
            <h3>All Ongoing Tasks</h3>
            <p class="task-count">0 Task Left</p>
          </div>
          <!-- <div class="view-task">
            <p class="user-task">
              <input type="checkbox" name="" id="Tasks" />Finalize the quarterly
              budget report
            </p>
            <img src="icons/delete-02-stroke-rounded.svg" alt="" />
          </div> -->
        </div>
      </div>
    </main>
    <footer>
      <p class="task-count">0 Task Remaining</p>
      <p class="task-comp">0 Complete Tasks</p>
    </footer>
    <script id="script">
      var completeCount = 0;
      let count = 0;
      function getInput() {
        let div = document.querySelector("#user-task");
        let userInput = div.value;
        addTask(userInput);
      }
      function addTask(userInput) {
        let div = document.querySelector(".onGoing");
        div.insertAdjacentHTML(
          "beforeend",
          `<div class="view-task">
                  <p class="user-task">
                    <input type="checkbox" name="" id="Tasks" />${userInput}
                  </p>
                  <img src="icons/delete-02-stroke-rounded.svg" alt="delete icon" class = "delete-btn"/>
                </div>`,
        );
        count++;
        let arr = count;
        document.querySelector(".task-count").innerHTML = `${count} Task Left`;
        document.querySelector("footer .task-count").innerHTML =
          `${count} Task Remaining`;
      }
      document
        .querySelector(".onGoing")
        .addEventListener("click", function (event) {
          if (event.target.classList.contains("delete-btn")) {
            event.target.parentElement.remove();
            count--;

            document.querySelector(".task-count").innerHTML =
              `${count} Task Left`;

            document.querySelector("footer .task-count").innerHTML =
              `${count} Task Remaining`;
            //document.querySelector("footer .task-comp").innerHTML =
            //`${completeCount} Completed Tasks`;
          }
        });
      document
        .querySelector(".onGoing")
        .addEventListener("change", function (event) {
          if (event.target.type === "checkbox") {
            if (event.target.checked) {
              completeCount++;

              let task = event.target.closest(".view-task");

              task.style.backgroundColor = "#faf8ff";
              task.style.opacity = "0.5";
              task.style.border = "none";

              task.querySelector(".user-task").style.textDecoration =
                "line-through";
              document.querySelector("footer .task-comp").innerHTML =
                `${completeCount} Completed Tasks`;
            } else {
              completeCount--;

              let task = event.target.closest(".view-task");

              task.style.backgroundColor = "#ffffff";

              task.style.opacity = "1";

              task.style.border = "1px solid #0000001a";

              task.querySelector(".user-task").style.textDecoration = "none";
              document.querySelector("footer .task-comp").innerHTML =
                `${completeCount} Completed Tasks`;
            }
          }
        });
    </script>
  </body>
</html>
