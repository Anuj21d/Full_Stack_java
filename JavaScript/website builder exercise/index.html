<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website Builder with DOM</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap");

      body {
        background-color: gray;
        color: aliceblue;
        font-family: "Work Sans", sans-serif;
      }
      .container {
        display: none;
        background-color: black;
        margin: 20px;
        padding: 15px 20px;
        border-radius: 10px;
      }
      .thumbnail {
        position: relative;
      }
      .thumbnail img {
        border-radius: 15px;
      }
      .thumbnail span {
        position: absolute;
        right: 10px;
        bottom: 5px;
        background-color: black;
        padding: 3px;
        margin: 5px;
        font-size: 16px;
        border-radius: 5px;
        opacity: 0.8;
        font-weight: 700;
      }
      .content{
        padding-left: 20px;
      }
      .content #title{
        margin: 0;
        margin-top: 5px;
        font-size: 24px;
        font-weight: 500;
      }
      .channel-info{
        display: flex;
        gap: 10px;
        color: rgb(96 95 95);
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="thumbnail">
        <img
          src="https://img.youtube.com/vi/Md5wvF3dVlU/mqdefault.jpg"
          width="350px"
          alt="Thumbnail"
        />
        <span>18:20</span>
      </div>
      <div class="content">
        <p id="title">Kya Hacker Banega re tu !😂| Part 1 |TLRP Highlights</p>
        <div class="channel-info">
            <p id="channel-name">ShreeManLegendLive</p>
            <p id="views">722k views </p>
            <p id="duration">2 hours ago</p>
        </div>
      </div>
    </div>
    <button onclick="creatCard()">Add Card</button>
    <script src="script.js"></script>
  </body>
</html>
