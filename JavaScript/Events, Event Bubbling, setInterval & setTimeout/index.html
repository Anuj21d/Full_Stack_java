<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Events, Event Bubbling, setInterval & setTimeout</title>
    <style>
      .container {
        background-color: aqua;
        margin: 14px;
        padding: 14px;
      }
      .childContainer {
        background-color: rgb(0, 183, 255);
        margin: 14px;
        padding: 14px;
      }
      .child {
        background-color: rgb(0, 145, 255);
        margin: 14px;
        padding: 14px;
        border: 2px solid black;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="childContainer">
        <div class="child">I am child</div>
      </div>
    </div>
    <script>
        /* Event Bubbling
      document.querySelector(".container").addEventListener("click", (e) => {
        alert("I am container");
      });
      document
        .querySelector(".childContainer")
        .addEventListener("click", (e) => {
          e.stopPropagation();
          alert("I am childContainer");
        });
      document.querySelector(".child").addEventListener("click", (e) => {
        e.stopPropagation();
        alert("I am child");
      }); */

      //setInterval(()=> {
      //  alert("hello");
      //},1000)
      setTimeout(()=> {
        alert("hello");
      },1000)
    </script>
  </body>
</html>
